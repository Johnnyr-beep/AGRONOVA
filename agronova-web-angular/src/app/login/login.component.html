<div class="min-h-screen flex items-center justify-center bg-[#05070a] relative overflow-hidden">
    <!-- Ultra-Sophisticated Ambient Lighting -->
    <div class="absolute top-[-20%] left-[-10%] w-[70%] h-[70%] bg-[#a4c639]/10 blur-[150px] rounded-full animate-pulse"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[70%] h-[70%] bg-[#a4c639]/5 blur-[150px] rounded-full"></div>
    
    <!-- Subtle Grid Pattern Overlay -->
    <div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#a4c639 1px, transparent 1px); background-size: 40px 40px;"></div>

    <div class="w-full max-w-2xl z-10 p-8">
        <!-- High-End Login Card (Expanded for Horizontal Layout) -->
        <div class="glass-card p-12 animate-fade-in border border-white/5 shadow-[0_40px_100px_rgba(0,0,0,0.8)] backdrop-blur-3xl relative overflow-hidden group">
            <!-- Decorative corner accent -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-bl from-[#a4c639]/5 to-transparent"></div>
            
            <!-- Horizontal Integrated Header -->
            <div class="flex items-center space-x-10 mb-12 relative z-10 border-b border-white/5 pb-10">
                <div class="transform hover:scale-105 transition-transform duration-500">
                    <img src="/logo santacruz.png.png" alt="Santacruz Logo" class="w-48 h-auto object-contain drop-shadow-[0_0_25px_rgba(164,198,57,0.2)]" />
                </div>
                
                <div class="h-16 w-px bg-white/10"></div>
                
                <div class="flex-1">
                    <div class="flex items-center space-x-3 mb-2">
                        <div class="w-2.5 h-2.5 bg-[#a4c639] rounded-full shadow-[0_0_12px_#a4c639] animate-pulse"></div>
                        <h2 class="text-3xl font-black text-white uppercase tracking-tighter">AGRONOVA <span class="text-[#a4c639]">Access</span></h2>
                    </div>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.4em] ml-6">Industrial Management Platform</p>
                </div>
            </div>
            
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-8 relative z-10">
                <!-- Username -->
                <div class="space-y-4">
                    <div class="flex justify-between items-center ml-1">
                        <label class="text-[11px] font-black text-slate-200 uppercase tracking-[0.25em]">Usuario del Sistema</label>
                        <i class="pi pi-user text-[#a4c639] text-xs"></i>
                    </div>
                    <div class="relative group/input">
                        <input type="text" pInputText formControlName="username" 
                               class="w-full bg-black/60 border border-white/10 text-white placeholder-slate-700 rounded-2xl py-6 px-8 focus:border-[#a4c639] transition-all font-black text-sm tracking-widest uppercase outline-none shadow-2xl"
                               placeholder="ID_OPERADOR" />
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-4">
                    <div class="flex justify-between items-center ml-1">
                        <label class="text-[11px] font-black text-slate-200 uppercase tracking-[0.25em]">Clave de Ingreso</label>
                        <i class="pi pi-lock text-[#a4c639] text-xs"></i>
                    </div>
                    <div class="relative group/input">
                        <p-password formControlName="password" [feedback]="false" [toggleMask]="true"
                                    styleClass="w-full"
                                    [inputStyle]="{'width':'100%', 'background':'rgba(0,0,0,0.6)', 'border':'1px solid rgba(255,255,255,0.1)', 'color':'white', 'padding-left':'2rem', 'border-radius':'1rem', 'padding-top':'1.5rem', 'padding-bottom':'1.5rem', 'font-weight':'900', 'letter-spacing':'0.4em', 'font-size':'0.9rem', 'box-shadow':'0 10px 30px rgba(0,0,0,0.3)'}"
                                    placeholder="••••••••"></p-password>
                    </div>
                </div>

                <!-- Error Message -->
                <div *ngIf="errorMessage" class="bg-rose-500/5 border border-rose-500/20 p-5 rounded-2xl animate-shake">
                    <p class="text-[10px] text-rose-400 font-black uppercase tracking-widest flex items-center">
                        <i class="pi pi-exclamation-triangle mr-3 text-lg"></i>
                        {{errorMessage}}
                    </p>
                </div>

                <!-- Submit Button -->
                <div class="pt-4">
                    <button type="submit" 
                            [disabled]="loginForm.invalid || loading"
                            class="w-full py-5.5 bg-gradient-to-r from-[#a4c639] to-[#8eb02f] hover:brightness-110 disabled:opacity-20 disabled:grayscale text-black rounded-2xl text-[11px] font-black tracking-[0.4em] shadow-[0_15px_40px_rgba(164,198,57,0.3)] transition-all transform active:scale-[0.98] flex items-center justify-center uppercase group/btn">
                        <i *ngIf="loading" class="pi pi-spin pi-spinner mr-4 text-lg"></i>
                        <span class="group-hover/btn:translate-x-1 transition-transform">{{loading ? 'Verificando Nodo...' : 'Validar Entrada'}}</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- Professional Metadata -->
        <div class="mt-12 flex justify-center items-center space-x-6 opacity-30">
             <span class="text-[9px] font-black uppercase tracking-[0.4em] text-white">Secure Access</span>
             <div class="w-1.5 h-1.5 bg-[#a4c639] rounded-full"></div>
             <span class="text-[9px] font-black uppercase tracking-[0.4em] text-white">V2.5.0-PRO</span>
        </div>
    </div>
</div>
