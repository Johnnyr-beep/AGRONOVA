<div class="login-wrapper">
    <!-- LEFT SIDE: Hero Visual -->
    <div class="login-hero">
        <div class="hero-mesh"></div>
        <div class="hero-orb hero-orb-1"></div>
        <div class="hero-orb hero-orb-2"></div>
        <div class="hero-grid"></div>

        <div class="hero-content">
            <div class="hero-badge">
                <span class="status-dot"></span>
                <span>Planta Activa</span>
            </div>
            <h1 class="hero-title">AGRO<span>NOVA</span></h1>
            <p class="hero-subtitle">Planta de Beneficio Bovino y Porcino</p>
            <div class="hero-divider"></div>
            <p class="hero-description">Control integral de procesos — Pesaje, Beneficio, Desposte, Acondicionamiento y Despacho.</p>
        </div>

        <div class="hero-footer">
            <span>Acceso Seguro</span>
            <span class="dot"></span>
            <span>256-bit</span>
            <span class="dot"></span>
            <span>v4.0</span>
        </div>
    </div>

    <!-- RIGHT SIDE: Login Form -->
    <div class="login-form-side">
        <div class="login-form-container animate-fade-in">
            <div class="form-header">
                <h2>Bienvenido</h2>
                <p>Ingrese sus credenciales para continuar</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
                <div class="field-group">
                    <label>
                        <i class="pi pi-user"></i>
                        <span>Usuario del Sistema</span>
                    </label>
                    <div class="input-wrapper">
                        <input type="text" pInputText formControlName="NombreUsuario"
                               placeholder="Ingrese su usuario"
                               id="login-username" />
                    </div>
                </div>

                <div class="field-group">
                    <label>
                        <i class="pi pi-lock"></i>
                        <span>Contraseña</span>
                    </label>
                    <div class="input-wrapper">
                        <p-password formControlName="Password" [feedback]="false" [toggleMask]="true"
                                    styleClass="w-full"
                                    [inputStyle]="passwordInputStyle"
                                    placeholder="••••••••"
                                    inputId="login-password"></p-password>
                    </div>
                </div>

                <div *ngIf="errorMessage" class="error-message">
                    <i class="pi pi-exclamation-circle"></i>
                    <span>{{errorMessage}}</span>
                </div>

                <button type="submit"
                        [disabled]="loginForm.invalid || loading"
                        class="login-btn"
                        id="login-submit-btn">
                    <span *ngIf="!loading" class="btn-content">
                        <span>Iniciar Sesión</span>
                        <i class="pi pi-arrow-right"></i>
                    </span>
                    <span *ngIf="loading" class="btn-content">
                        <i class="pi pi-spin pi-spinner"></i>
                        <span>Verificando...</span>
                    </span>
                </button>
            </form>

            <div class="form-footer">
                <span>AGRONOVA Industrial</span>
                <span class="dot"></span>
                <span>v4.0.0</span>
            </div>
        </div>
    </div>
</div>
