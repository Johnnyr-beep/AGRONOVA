<div class="space-y-6 animate-fade-in">
    <div class="glass-card p-7 flex justify-between items-center relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-48 h-48 rounded-full" style="background: rgba(16, 185, 129, 0.04); filter: blur(60px);"></div>
        <div class="flex items-center space-x-5 relative z-10">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center" style="background: linear-gradient(135deg, #6C5CE7, #00CEC9);">
                <i class="pi pi-th-large text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-extrabold text-white tracking-tight">Gestión de <span style="color: #6C5CE7;">Desposte</span></h1>
                <p class="text-[10px] mt-0.5" style="color: #475569;">Control de Cortes y Rendimientos</p>
            </div>
        </div>
        <div class="hidden md:flex items-center space-x-3 relative z-10">
            <button (click)="loadData()" class="px-5 py-2.5 rounded-xl font-bold text-[10px] tracking-wider transition-all hover:bg-white/5" style="color: #94A3B8; border: 1px solid rgba(148,163,184,0.06);">REFRESCAR</button>
            <button class="px-5 py-2.5 rounded-xl font-bold text-[10px] tracking-wider" style="background: linear-gradient(135deg, #6C5CE7, #00CEC9); color: white;">NUEVO DESPOSTE</button>
        </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4" *ngIf="reportStats">
        <app-stat-card title="Total Procesado" [value]="reportStats.pesoTotalProcesado" unit="KG" severity="slate"></app-stat-card>
        <app-stat-card title="Productos Finales" [value]="reportStats.pesoTotalProductos" unit="KG" severity="info"></app-stat-card>
        <app-stat-card title="Mermas" [value]="reportStats.totalMermas" unit="KG" severity="danger"></app-stat-card>
        <app-stat-card title="Rendimiento" [value]="(reportStats.promedioRendimiento | number:'1.2-2') + '%'" severity="success"></app-stat-card>
    </div>
    <div class="glass-card overflow-hidden">
        <p-table [value]="despostes" [loading]="loading" [rows]="10" [paginator]="true" responsiveLayout="scroll" styleClass="p-datatable-lg">
            <ng-template pTemplate="header"><tr><th># Desposte</th><th>Canal Ref.</th><th>Operario</th><th>Peso Original</th><th>Estado</th><th>Progreso</th><th style="width:120px"></th></tr></ng-template>
            <ng-template pTemplate="body" let-item>
                <tr class="group">
                    <td class="font-bold uppercase" style="color:#6C5CE7;">#{{item.NumeroDesposte}}</td>
                    <td><span class="px-2.5 py-1 rounded-lg text-[10px] font-bold" style="background:rgba(2,6,23,0.5);color:#94A3B8;border:1px solid rgba(148,163,184,0.06);">CANAL-{{item.canal?.NumeroCanal||'N/A'}}</span></td>
                    <td class="text-sm text-white font-medium">{{item.operario?.Nombre}}</td>
                    <td class="font-semibold text-white">{{item.PesoCanalOriginal}} <span class="text-[10px] ml-1" style="color:#475569;">kg</span></td>
                    <td><span class="px-3 py-1 rounded-lg text-[9px] font-bold uppercase" [style.background]="item.Estado==2?'rgba(16,185,129,0.06)':item.Estado==1?'rgba(245,158,11,0.06)':'rgba(6,182,212,0.06)'" [style.color]="item.Estado==2?'#6C5CE7':item.Estado==1?'#F59E0B':'#06B6D4'" [style.border]="'1px solid '+(item.Estado==2?'rgba(16,185,129,0.12)':item.Estado==1?'rgba(245,158,11,0.12)':'rgba(6,182,212,0.12)')">{{getStatusName(item.Estado||0)}}</span></td>
                    <td class="w-48"><div class="h-1 w-full rounded-full overflow-hidden" style="background:rgba(2,6,23,0.5);"><div class="h-full rounded-full transition-all duration-700" style="background:linear-gradient(90deg,#00CEC9,#6C5CE7);" [style.width.%]="item.Estado==2?100:(item.Estado==1?50:0)"></div></div></td>
                    <td class="text-right"><div class="flex justify-end space-x-1.5 opacity-0 group-hover:opacity-100 transition-all"><button *ngIf="item.Estado==0" (click)="startDesposte(item)" class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:rgba(16,185,129,0.08);color:#6C5CE7;"><i class="pi pi-play text-xs"></i></button><button *ngIf="item.Estado==1" (click)="completeDesposte(item)" class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:rgba(6,182,212,0.08);color:#06B6D4;"><i class="pi pi-check text-xs"></i></button><button class="w-7 h-7 rounded-lg flex items-center justify-center hover:bg-white/5" style="color:#64748B;"><i class="pi pi-eye text-xs"></i></button></div></td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
<p-toast></p-toast>
