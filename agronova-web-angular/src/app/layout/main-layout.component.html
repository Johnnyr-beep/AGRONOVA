<div class="flex h-screen overflow-hidden" style="background: #08090C;">
    <!-- Ambient Effects -->
    <div class="fixed pointer-events-none" style="top:-20%;right:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(108,92,231,.06) 0%,transparent 70%)"></div>
    <div class="fixed pointer-events-none" style="bottom:-20%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(0,206,201,.04) 0%,transparent 70%)"></div>

    <!-- ═══ SIDEBAR (Icon-only 72px / Expanded 240px) ═══ -->
    <aside [class.w-60]="!isSidebarCollapsed" [class.w-[72px]]="isSidebarCollapsed"
           class="flex flex-col transition-all duration-500 ease-out z-20 relative"
           style="background: #0D0F14; border-right: 1px solid rgba(255,255,255,.06);">

        <!-- Logo -->
        <div class="flex items-center px-4" style="height:64px" [class.justify-center]="isSidebarCollapsed">
            <div class="w-10 h-10 rounded-[14px] flex items-center justify-center flex-shrink-0"
                 style="background: linear-gradient(135deg, #6C5CE7, #00CEC9); box-shadow: 0 4px 20px rgba(108,92,231,.3);">
                <span class="text-white font-extrabold text-base">A</span>
            </div>
            <div *ngIf="!isSidebarCollapsed" class="ml-3 animate-fade-in">
                <h1 class="text-[15px] font-extrabold text-white tracking-tight leading-none">AGRONOVA</h1>
                <span class="text-[8px] font-semibold uppercase tracking-[2.5px]" style="color:#3D4050">Planta de Beneficio</span>
            </div>
        </div>

        <!-- Divider -->
        <div class="mx-4 mb-2" style="height:1px;background:rgba(255,255,255,.06)"></div>

        <!-- Section Label -->
        <p *ngIf="!isSidebarCollapsed" class="px-5 mb-2 text-[9px] font-bold uppercase tracking-[2.5px]" style="color:#3D4050">
            Operaciones
        </p>

        <!-- Navigation -->
        <nav class="flex-1 px-2 space-y-1 overflow-y-auto" style="scrollbar-width:thin">
            <a *ngFor="let item of menuItems"
               [routerLink]="item.route"
               routerLinkActive="nav-active"
               class="nav-item flex items-center rounded-[14px] transition-all duration-300 relative overflow-hidden group"
               [class.px-3]="!isSidebarCollapsed"
               [class.py-2.5]="!isSidebarCollapsed"
               [class.p-3]="isSidebarCollapsed"
               [class.justify-center]="isSidebarCollapsed"
               [pTooltip]="isSidebarCollapsed ? item.label : ''" tooltipPosition="right">
                <i [class]="item.icon" class="text-[16px] min-w-[22px] transition-colors duration-300"
                   style="color:#3D4050"></i>
                <span *ngIf="!isSidebarCollapsed"
                      class="ml-3 font-semibold text-[12px] tracking-wide transition-colors duration-300"
                      style="color:#7C8190">
                    {{item.label}}
                </span>
                <div class="active-bar"></div>
            </a>
        </nav>

        <!-- User -->
        <div class="p-3" style="border-top:1px solid rgba(255,255,255,.06)">
            <div class="flex items-center rounded-[14px] p-2.5 transition-all"
                 [class.justify-center]="isSidebarCollapsed"
                 style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06)">
                <p-avatar [label]="(user$ | async)?.Nombre?.substring(0,1)" shape="circle"
                          [style]="{'background':'linear-gradient(135deg,#6C5CE7,#00CEC9)','color':'white','font-weight':'800','font-size':'11px'}"
                          size="normal"></p-avatar>
                <div *ngIf="!isSidebarCollapsed" class="ml-3 overflow-hidden animate-fade-in">
                    <p class="text-[11px] font-bold text-white truncate">{{ (user$ | async)?.Nombre || 'Usuario' }}</p>
                    <p class="text-[9px] font-medium" style="color:#3D4050">Operador</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- ═══ MAIN AREA ═══ -->
    <div class="flex-1 flex flex-col min-w-0 relative">
        <!-- Header -->
        <header class="h-14 flex items-center justify-between px-6 z-10"
                style="background:rgba(13,15,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06)">
            <div class="flex items-center space-x-4">
                <button (click)="toggleSidebar()"
                        class="w-8 h-8 rounded-lg flex items-center justify-center transition-all"
                        style="border:1px solid rgba(255,255,255,.06);background:transparent"
                        id="btn-toggle-sidebar">
                    <i class="pi pi-bars text-sm" style="color:#3D4050"></i>
                </button>
                <div>
                    <h2 class="text-sm font-bold text-white tracking-tight">
                        <span class="gradient-text">AGRONOVA</span> — Panel de Control
                    </h2>
                    <div class="flex items-center space-x-2 mt-0.5">
                        <p class="text-[9px] font-medium" style="color:#3D4050">{{ today | date:'dd MMM yyyy' | uppercase }}</p>
                        <div class="status-dot"></div>
                        <p class="text-[9px] font-semibold" style="color:#00B894">Planta Activa</p>
                    </div>
                </div>
            </div>

            <div class="flex items-center space-x-2">
                <div class="flex items-center gap-1 p-1 rounded-lg" style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06)">
                    <button class="w-8 h-8 rounded-lg flex items-center justify-center transition-all hover:bg-white/5"
                            id="btn-search"><i class="pi pi-search text-sm" style="color:#3D4050"></i></button>
                    <button class="w-8 h-8 rounded-lg flex items-center justify-center transition-all hover:bg-white/5"
                            id="btn-notifications"><i class="pi pi-bell text-sm" style="color:#3D4050"></i></button>
                    <button (click)="logout()"
                            class="w-8 h-8 rounded-lg flex items-center justify-center transition-all hover:bg-red-500/10"
                            id="btn-logout"><i class="pi pi-power-off text-sm" style="color:#3D4050"></i></button>
                </div>
            </div>
        </header>

        <!-- Content -->
        <main class="flex-1 overflow-y-auto p-5 relative" style="scrollbar-width:thin">
            <div class="max-w-[1440px] mx-auto animate-fade-in">
                <router-outlet></router-outlet>
            </div>
        </main>
    </div>
</div>
