<div class="space-y-5 animate-fade-in">
  <p-toast></p-toast><p-confirmDialog></p-confirmDialog>
  <div class="glass-card p-6">
    <div class="flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <div class="w-11 h-11 rounded-2xl flex items-center justify-center" style="background:linear-gradient(135deg,#A29BFE,#6C5CE7);box-shadow:0 4px 16px rgba(162,155,254,0.2);">
          <i class="pi pi-box text-white text-lg"></i>
        </div>
        <div>
          <h1 class="text-xl font-extrabold text-white tracking-tight">Embalajes</h1>
          <p class="text-xs mt-0.5" style="color:#3D4050">Empaque de productos</p>
        </div>
      </div>
      <button pButton icon="pi pi-plus" label="Nuevo Embalaje" class="p-button-sm" style="background:linear-gradient(135deg,#A29BFE,#6C5CE7);border:none;" (click)="openNew()"></button>
    </div>
  </div>
  <div class="glass-card p-0 overflow-hidden">
    <p-table [value]="items" [loading]="loading" [paginator]="true" [rows]="20" styleClass="p-datatable-sm">
      <ng-template pTemplate="header">
        <tr><th>N° Embalaje</th><th>Fecha</th><th>Peso Neto (kg)</th><th>Lote</th><th>Vencimiento</th><th>Estado</th><th class="text-center">Acciones</th></tr>
      </ng-template>
      <ng-template pTemplate="body" let-e>
        <tr>
          <td class="font-semibold text-white">{{ e.NumeroEmbalaje }}</td>
          <td style="color:#8892A4">{{ e.FechaEmbalaje | date:'dd/MM/yyyy' }}</td>
          <td style="color:#8892A4">{{ e.PesoNeto ?? '—' }}</td>
          <td style="color:#8892A4">{{ e.Lote || '—' }}</td>
          <td style="color:#8892A4">{{ e.FechaVencimiento | date:'dd/MM/yyyy' }}</td>
          <td><p-tag [value]="e.Estado || 'Pendiente'" [severity]="getSeverity(e.Estado)"></p-tag></td>
          <td class="text-center">
            <div class="flex justify-center gap-2">
              <button pButton icon="pi pi-pencil" class="p-button-sm p-button-text p-button-secondary" (click)="openEdit(e)"></button>
              <button pButton icon="pi pi-trash" class="p-button-sm p-button-text p-button-danger" (click)="confirmDelete(e)"></button>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage"><tr><td colspan="7" class="text-center py-8" style="color:#3D4050">No hay embalajes registrados</td></tr></ng-template>
    </p-table>
  </div>
</div>
<p-dialog [(visible)]="displayDialog" [modal]="true" [style]="{width:'520px'}" [header]="editingId ? 'Editar Embalaje' : 'Nuevo Embalaje'" [draggable]="false" [resizable]="false">
  <form [formGroup]="form" class="space-y-4 pt-2">
    <div class="grid grid-cols-2 gap-4">
      <div class="space-y-1 col-span-2"><label class="text-xs font-bold uppercase tracking-widest" style="color:#3D4050">N° Embalaje *</label><input pInputText formControlName="NumeroEmbalaje" class="w-full" /><small *ngIf="fieldInvalid('NumeroEmbalaje')" class="text-red-400">Campo obligatorio</small></div>
      <div class="space-y-1"><label class="text-xs font-bold uppercase tracking-widest" style="color:#3D4050">Fecha</label><input type="date" pInputText formControlName="FechaEmbalaje" class="w-full" /></div>
      <div class="space-y-1"><label class="text-xs font-bold uppercase tracking-widest" style="color:#3D4050">Lote</label><input pInputText formControlName="Lote" class="w-full" /></div>
      <div class="space-y-1"><label class="text-xs font-bold uppercase tracking-widest" style="color:#3D4050">Peso Neto (kg)</label><p-inputNumber formControlName="PesoNeto" [minFractionDigits]="3" class="w-full"></p-inputNumber></div>
      <div class="space-y-1"><label class="text-xs font-bold uppercase tracking-widest" style="color:#3D4050">Peso Bruto (kg)</label><p-inputNumber formControlName="PesoBruto" [minFractionDigits]="3" class="w-full"></p-inputNumber></div>
      <div class="space-y-1"><label class="text-xs font-bold uppercase tracking-widest" style="color:#3D4050">Peso Tara (kg)</label><p-inputNumber formControlName="PesoTara" [minFractionDigits]="3" class="w-full"></p-inputNumber></div>
      <div class="space-y-1"><label class="text-xs font-bold uppercase tracking-widest" style="color:#3D4050">Unidades</label><p-inputNumber formControlName="CantidadUnidades" [min]="1" class="w-full"></p-inputNumber></div>
      <div class="space-y-1"><label class="text-xs font-bold uppercase tracking-widest" style="color:#3D4050">Temp. Producto (°C)</label><p-inputNumber formControlName="TemperaturaProducto" [minFractionDigits]="1" class="w-full"></p-inputNumber></div>
      <div class="space-y-1"><label class="text-xs font-bold uppercase tracking-widest" style="color:#3D4050">Vencimiento</label><input type="date" pInputText formControlName="FechaVencimiento" class="w-full" /></div>
      <div class="space-y-1 col-span-2"><label class="text-xs font-bold uppercase tracking-widest" style="color:#3D4050">Código de Barras</label><input pInputText formControlName="CodigoBarras" class="w-full" /></div>
      <div class="space-y-1 col-span-2"><label class="text-xs font-bold uppercase tracking-widest" style="color:#3D4050">Observaciones</label><input pInputText formControlName="Observaciones" class="w-full" /></div>
    </div>
  </form>
  <ng-template pTemplate="footer">
    <button pButton label="Cancelar" class="p-button-text p-button-secondary" (click)="displayDialog=false"></button>
    <button pButton label="Guardar" icon="pi pi-check" style="background:linear-gradient(135deg,#A29BFE,#6C5CE7);border:none;" (click)="save()"></button>
  </ng-template>
</p-dialog>
